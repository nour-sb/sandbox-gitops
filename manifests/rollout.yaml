apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: fake-service
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: fake-service
  template:
    metadata:
      labels:
        app: fake-service
    spec:
      containers:
      - name: fake-service
        image: hashicorp/http-echo:0.2.3
        args:
        - "-text=service=fake-service version=v1.0.0 status=stable"
        - "-listen=:5678"
        ports:
        - containerPort: 5678
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
  strategy:
    canary:
      steps:
      - setWeight: 25
      - pause:
          duration: 60s
      - setWeight: 50
      - pause:
          duration: 60s
      - setWeight: 100
